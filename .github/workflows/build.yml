name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_ubuntu:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout master
      uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libncurses-dev pkg-config

    - name: Configure
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: cmake --build build --parallel 4 --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ubuntu-latest
        path: |
          build/sf*
          build/Release/sf*
          build/*.yaml
          build/Release/*.yaml
          build/lang/
          
    - name: Run Tests
      run: ctest --test-dir build --output-on-failure


  build_macos:
    runs-on: macos-latest
    steps:
    - name: Checkout master
      uses: actions/checkout@v4
    - name: Install dependencies
      run: brew install ncurses pkg-config

    - name: Configure
      run: PKG_CONFIG_PATH="$(brew --prefix ncurses)/lib/pkgconfig" cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix ncurses)"
    - name: Build
      run: cmake --build build --parallel 4 --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-latest
        path: |
          build/sf*
          build/Release/sf*
          build/*.yaml
          build/Release/*.yaml
          build/lang/
          
    - name: Run Tests
      run: ctest --test-dir build --output-on-failure
      

  build_windows:
    runs-on: windows-latest
    steps:
    - name: Checkout master
      uses: actions/checkout@v4

    - name: Configure
      run: cmake -S . -B build
    - name: Build
      run: cmake --build build --parallel 4 --target ALL_BUILD --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-latest
        path: |
          build/*.exe
          build/Release/*.exe
          build/*.yaml
          build/Release/*.yaml
          build/lang/
          
    - name: Run Tests
      run: ctest --test-dir build -C Release --output-on-failure
